<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASKR — Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #f5c542;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --done: #1a2a1a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }
    .container { position: relative; z-index: 1; width: 100%; max-width: 560px; }
    header { margin-bottom: 40px; }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 1;
      letter-spacing: 4px;
      color: var(--accent);
      text-shadow: 4px 4px 0 rgba(245,197,66,0.15);
    }
    .subtitle { color: var(--muted); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
    .stats { display: flex; gap: 24px; margin-top: 20px; }
    .stat { display: flex; flex-direction: column; }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 32px; }
    .todo-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .todo-input:focus { border-color: var(--accent); }
    .todo-input::placeholder { color: var(--muted); }
    .priority-select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .add-btn {
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(245,197,66,0.25); }
    .add-btn:active { transform: translateY(0); }
    .filters { display: flex; gap: 8px; margin-bottom: 20px; }
    .filter-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(245,197,66,0.07); }
    .todo-list { display: flex; flex-direction: column; gap: 10px; }
    .todo-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s, background 0.2s;
    }
    .todo-item.done { background: var(--done); border-color: #2a4a2a; opacity: 0.75; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .check-wrap { width: 22px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .check-wrap input { display: none; }
    .check-box {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .check-wrap input:checked + .check-box { background: #4caf50; border-color: #4caf50; }
    .check-box svg { display: none; }
    .check-wrap input:checked + .check-box svg { display: block; }
    .todo-text { flex: 1; font-size: 15px; line-height: 1.4; transition: all 0.2s; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); }
    .priority-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px; }
    .priority-high { background: rgba(255,107,107,0.15); color: var(--accent2); }
    .priority-med  { background: rgba(245,197,66,0.15);  color: var(--accent); }
    .priority-low  { background: rgba(100,200,100,0.12); color: #7ec87e; }
    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    .del-btn:hover { color: var(--accent2); background: rgba(255,107,107,0.1); }
    .empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
    .clear-btn {
      margin-top: 24px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">TASKR</div>
      <div class="subtitle">Get things done.</div>
      <div class="stats">
        <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">Total</span></div>
        <div class="stat"><span class="stat-num" id="doneCount">0</span><span class="stat-label">Done</span></div>
        <div class="stat"><span class="stat-num" id="leftCount">0</span><span class="stat-label">Left</span></div>
      </div>
    </header>
    <div class="input-row">
      <input class="todo-input" id="todoInput" type="text" placeholder="What needs to be done?" />
      <select class="priority-select" id="prioritySelect">
        <option value="high">🔴 High</option>
        <option value="med" selected>🟡 Med</option>
        <option value="low">🟢 Low</option>
      </select>
      <button class="add-btn" onclick="addTodo()">ADD</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    </div>
    <div class="todo-list" id="todoList"></div>
    <button class="clear-btn" onclick="clearDone()">✕ Clear completed</button>
  </div>
  <script>
    let todos = JSON.parse(localStorage.getItem('taskr') || '[]');
    let filter = 'all';
    function save() { localStorage.setItem('taskr', JSON.stringify(todos)); }
    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
      document.getElementById('totalCount').textContent = todos.length;
      document.getElementById('doneCount').textContent = todos.filter(t => t.done).length;
      document.getElementById('leftCount').textContent = todos.filter(t => !t.done).length;
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">Nothing here yet</div></div>`;
        return;
      }
      list.innerHTML = filtered.map(t => `
        <div class="todo-item ${t.done ? 'done' : ''}">
          <label class="check-wrap">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <div class="check-box">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </label>
          <span class="todo-text">${escHtml(t.text)}</span>
          <span class="priority-tag priority-${t.priority}">${t.priority}</span>
          <button class="del-btn" onclick="deleteTodo(${t.id})">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>`).join('');
    }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      const priority = document.getElementById('prioritySelect').value;
      todos.unshift({ id: Date.now(), text, done: false, priority });
      input.value = '';
      save(); render();
    }
    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }
    function deleteTodo(id) { todos = todos.filter(t => t.id !== id); save(); render(); }
    function clearDone() { todos = todos.filter(t => !t.done); save(); render(); }
    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }
    document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    render();
  </script>
</body>
</html>
