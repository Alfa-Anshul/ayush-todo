<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASKR — Todo</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #21262d;
      --border:   #30363d;
      --border2:  #3d444e;
      --accent:   #238636;
      --accent-hover: #2ea043;
      --accent-fg: #3fb950;
      --blue:     #388bfd;
      --blue-bg:  rgba(56,139,253,0.1);
      --red:      #f85149;
      --red-bg:   rgba(248,81,73,0.1);
      --yellow:   #d29922;
      --yellow-bg:rgba(210,153,34,0.1);
      --text:     #e6edf3;
      --text2:    #7d8590;
      --text3:    #484f58;
      --done-bg:  #0d1117;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 80px;
    }
    .container { width: 100%; max-width: 600px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .gh-icon { color: var(--text); }
    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    .repo-path { color: var(--text2); font-size: 20px; font-weight: 400; }
    .repo-path span { color: var(--blue); }
    .badge {
      font-size: 11px;
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 2px 8px;
      color: var(--text2);
      background: var(--surface2);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
    }
    .stat-pill .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .dot-green  { background: #3fb950; }
    .dot-blue   { background: #388bfd; }
    .dot-orange { background: #db6d28; }
    .stat-pill strong { color: var(--text); }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }
    .gh-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      height: 32px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .gh-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
    }
    .gh-input::placeholder { color: var(--text3); }
    .gh-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      height: 32px;
      outline: none;
      cursor: pointer;
    }
    .gh-btn {
      height: 32px;
      padding: 0 16px;
      background: var(--accent);
      border: 1px solid rgba(240,246,252,0.1);
      border-radius: 6px;
      color: #ffffff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .gh-btn:hover { background: var(--accent-hover); }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .tab {
      padding: 8px 16px;
      font-size: 14px;
      color: var(--text2);
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      margin-bottom: -1px;
      background: transparent;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      background: var(--surface);
      border-color: var(--border);
      border-bottom-color: var(--surface);
    }
    .tab .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 11px;
      padding: 0 6px;
      color: var(--text2);
    }
    .tab.active .count-badge { background: var(--border2); }

    /* Issue list */
    .issue-list {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .issue-list-header {
      background: var(--surface2);
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .issue-item {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: background 0.12s;
      animation: fadeIn 0.2s ease;
    }
    .issue-item:last-child { border-bottom: none; }
    .issue-item:hover { background: var(--surface2); }
    .issue-item.done { opacity: 0.6; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .issue-icon { margin-top: 2px; flex-shrink: 0; }
    .open-icon  { color: var(--accent-fg); }
    .closed-icon { color: var(--text3); }

    .issue-body { flex: 1; min-width: 0; }
    .issue-title {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 4px;
      cursor: pointer;
      display: inline;
    }
    .issue-item.done .issue-title {
      text-decoration: line-through;
      color: var(--text2);
    }
    .issue-meta {
      font-size: 12px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .label-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 12px;
      padding: 0 7px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .label-high   { background: rgba(248,81,73,0.15);  border-color: rgba(248,81,73,0.3);  color: #f85149; }
    .label-med    { background: rgba(210,153,34,0.15); border-color: rgba(210,153,34,0.3); color: #d29922; }
    .label-low    { background: rgba(63,185,80,0.15);  border-color: rgba(63,185,80,0.3);  color: #3fb950; }

    .issue-actions { display: flex; align-items: center; gap: 8px; }
    .action-btn {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.12s, background 0.12s;
    }
    .action-btn.check-btn:hover { color: var(--accent-fg); background: rgba(63,185,80,0.1); }
    .action-btn.delete-btn:hover { color: var(--red); background: var(--red-bg); }

    .empty-state {
      background: var(--surface);
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-title { font-size: 16px; color: var(--text); font-weight: 600; margin-bottom: 4px; }
    .empty-sub { font-size: 13px; }

    /* Footer actions */
    .footer-actions { display: flex; gap: 8px; }
    .ghost-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.12s;
    }
    .ghost-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <svg class="gh-icon" width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    <div class="logo">Alfa-Anshul / <span style="color:var(--blue)">taskr</span></div>
    <span class="badge">Public</span>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-pill"><div class="dot dot-green"></div><strong id="openCount">0</strong> Open</div>
    <div class="stat-pill"><div class="dot dot-blue"></div><strong id="doneCount">0</strong> Closed</div>
    <div class="stat-pill"><div class="dot dot-orange"></div><strong id="totalCount">0</strong> Total</div>
  </div>

  <!-- New issue toolbar -->
  <div class="toolbar">
    <input class="gh-input" id="todoInput" type="text" placeholder="New issue title..." />
    <select class="gh-select" id="prioritySelect">
      <option value="high">🔴 high</option>
      <option value="med" selected>🟡 medium</option>
      <option value="low">🟢 low</option>
    </select>
    <button class="gh-btn" onclick="addTodo()">New issue</button>
  </div>

  <!-- Tabs -->
  <div class="filter-tabs">
    <button class="tab active" id="tab-all" onclick="setFilter('all', this)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/><path fill-rule="evenodd" d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z"/></svg>
      Open <span class="count-badge" id="badge-open">0</span>
    </button>
    <button class="tab" id="tab-done" onclick="setFilter('done', this)">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1.5 8a6.5 6.5 0 0110.65-5.003.75.75 0 00.959-1.153 8 8 0 102.592 8.33.75.75 0 10-1.444-.407A6.5 6.5 0 011.5 8zM8 12a1 1 0 100-2 1 1 0 000 2zm0-8a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 018 4zm4.78 4.28l3-3a.75.75 0 00-1.06-1.06l-2.47 2.47-.97-.97a.749.749 0 10-1.06 1.06l1.5 1.5a.75.75 0 001.06 0z"/></svg>
      Closed <span class="count-badge" id="badge-done">0</span>
    </button>
  </div>

  <!-- Issue list -->
  <div class="issue-list">
    <div class="issue-list-header">
      <span id="listLabel">All issues</span>
      <button class="ghost-btn" onclick="clearDone()" style="padding:2px 8px;font-size:11px;">Clear closed</button>
    </div>
    <div id="todoList"></div>
  </div>

  <div class="footer-actions">
    <button class="ghost-btn" onclick="clearDone()">✕ Close all completed</button>
  </div>

</div>
<script>
  let todos = JSON.parse(localStorage.getItem('taskr-gh') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('taskr-gh', JSON.stringify(todos)); }

  function render() {
    const open   = todos.filter(t => !t.done);
    const closed = todos.filter(t =>  t.done);
    const filtered = filter === 'all' ? todos : filter === 'done' ? closed : open;

    document.getElementById('openCount').textContent  = open.length;
    document.getElementById('doneCount').textContent  = closed.length;
    document.getElementById('totalCount').textContent = todos.length;
    document.getElementById('badge-open').textContent = open.length;
    document.getElementById('badge-done').textContent = closed.length;
    document.getElementById('listLabel').textContent  =
      filter === 'all'  ? 'All issues' :
      filter === 'done' ? 'Closed issues' : 'Open issues';

    const list = document.getElementById('todoList');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Nothing to show here</div>
        <div class="empty-sub">No ${filter === 'done' ? 'closed' : filter === 'active' ? 'open' : ''} issues found.</div>
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="issue-item ${t.done ? 'done' : ''}">
        <div class="issue-icon">
          ${t.done
            ? `<svg width="16" height="16" viewBox="0 0 16 16" fill="#7d8590"><path fill-rule="evenodd" d="M1.5 8a6.5 6.5 0 0110.65-5.003.75.75 0 00.959-1.153 8 8 0 102.592 8.33.75.75 0 10-1.444-.407A6.5 6.5 0 011.5 8zM8 12a1 1 0 100-2 1 1 0 000 2zm0-8a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 018 4zm4.78 4.28l3-3a.75.75 0 00-1.06-1.06l-2.47 2.47-.97-.97a.749.749 0 10-1.06 1.06l1.5 1.5a.75.75 0 001.06 0z"/></svg>`
            : `<svg width="16" height="16" viewBox="0 0 16 16" fill="#3fb950"><path d="M8 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/><path fill-rule="evenodd" d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0z"/></svg>`
          }
        </div>
        <div class="issue-body">
          <span class="issue-title" onclick="toggle(${t.id})">${escHtml(t.text)}</span>
          <div class="issue-meta">
            <span class="label-tag label-${t.priority}">${t.priority}</span>
            <span>#${t.id % 10000} opened by Aniket</span>
          </div>
        </div>
        <div class="issue-actions">
          <button class="action-btn check-btn" title="${t.done ? 'Reopen' : 'Close'}" onclick="toggle(${t.id})">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>
          </button>
          <button class="action-btn delete-btn" title="Delete" onclick="deleteTodo(${t.id})">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M6.5 1.75a.25.25 0 01.25-.25h2.5a.25.25 0 01.25.25V3h-3V1.75zm4.5 0V3h2.25a.75.75 0 010 1.5H2.75a.75.75 0 010-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75zM4.496 6.559a.75.75 0 10-1.492.142l.686 7.189a.25.25 0 00.249.232h7.122a.25.25 0 00.249-.232l.686-7.19a.75.75 0 10-1.492-.14L10 12.25H6L4.496 6.559z"/></svg>
          </button>
        </div>
      </div>`).join('');
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;
    const priority = document.getElementById('prioritySelect').value;
    todos.unshift({ id: Date.now(), text, done: false, priority });
    input.value = '';
    save(); render();
  }
  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }
  function deleteTodo(id) { todos = todos.filter(t => t.id !== id); save(); render(); }
  function clearDone() { todos = todos.filter(t => !t.done); save(); render(); }
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }
  document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
  render();
</script>
</body>
</html>
